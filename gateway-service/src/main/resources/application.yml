server:
  port: 8080

spring:
  application:
    name: gateway-service
  
  cloud:
    gateway:
      routes:
        # 1. Auth Service Route (PUBLIC)
        # We don't apply the AuthenticationFilter here so users can login/register
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        # 2. Example Protected Service (SECURED)
        # Any request to /inventory/** will be intercepted by your AuthenticationFilter
        - id: inventory-service
          uri: http://localhost:8082
          predicates:
            - Path=/inventory/**
          filters:
            - AuthenticationFilter

# Custom property for JWT Secret (Matches Auth Service)
